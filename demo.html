<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourPay SDK Demo</title>
    <script src="checkout.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f7f6;
        }

        .container {
            background: white;
            padding: 48px;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 8px;
            color: #1a1c1e;
        }

        p {
            color: #666;
            margin-bottom: 32px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .pay-btn {
            background: #6200EE;
            color: white;
            border: none;
            padding: 18px 32px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(98, 0, 238, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>YourPay Demo</h1>
        <p>Integrate QR payments in minutes.</p>

        <div class="input-group">
            <label>API KEY</label>
            <input type="text" id="apiKey" placeholder="Enter your API Key">
        </div>

        <div class="input-group">
            <label>AMOUNT (Rs.)</label>
            <input type="number" id="amount" value="10.00">
        </div>

        <button class="pay-btn" onclick="openCheckout()">Pay with YourPay</button>
    </div>

    <script>
        function openCheckout() {
            const apiKey = document.getElementById('apiKey').value;
            const amount = document.getElementById('amount').value;

            if (!apiKey) return alert('Please enter an API Key');

            YourPay.open({
                apiKey: apiKey,
                amount: parseFloat(amount),
                onSuccess: (response) => {
                    console.log('Payment Success:', response);
                    alert('✅ Payment successful! Response: ' + JSON.stringify(response));
                },
                onFailure: (error) => {
                    console.log('Payment Failed:', error);
                    // alert('❌ Payment failed or cancelled: ' + error);
                }
            });
        }
    </script>
</body>

</html>
