<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway Tester</title>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #6200EE;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 100%;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #EEE;
            border-radius: 12px;
            font-size: 16px;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        #result {
            margin-top: 24px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        #qrcode {
            display: inline-block;
            padding: 16px;
            background: white;
            border-radius: 12px;
        }

        .success-box {
            background: #E8F5E9;
            color: #2E7D32;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container" id="tester-card">
        <h1>Payment Tester</h1>

        <div class="input-group">
            <label>API KEY</label>
            <input type="text" id="apiKey" placeholder="Your 24-char API key">
        </div>

        <div class="input-group">
            <label>API SECRET</label>
            <input type="password" id="apiSecret" placeholder="Your API Secret">
        </div>

        <button onclick="generate()">Generate 2 Rs Payment</button>

        <div id="result">
            <p style="margin-bottom: 12px; font-weight: 600;">Scan to Pay</p>
            <div id="qrcode"></div>
            <p style="font-size: 12px; color: #666; margin-top: 12px;">Waiting for app confirmation...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sxlvxihdgvdrrlfmmusu.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4bHZ4aWhkZ3ZkcnJsZm1tdXN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA1NDI4NjQsImV4cCI6MjA4NjExODg2NH0.hjEKovqdb5P--C8Jhirz0_k78aeyMmGIKlR_PLoVzzk';

        async function generate() {
            const apiKey = document.getElementById('apiKey').value;
            const apiSecret = document.getElementById('apiSecret').value;
            const resDiv = document.getElementById('result');

            if (!apiKey || !apiSecret) return alert('Enter credentials');

            const timestamp = new Date().toISOString();
            const amount = "2.0";
            const successUrl = "https://yourdomain.com/success";

            const apiKeyHash = CryptoJS.SHA256(apiKey).toString();
            const signature = CryptoJS.HmacSHA256(amount + successUrl + timestamp, apiSecret).toString();

            const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/create_hosted_session_v3`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${ANON_KEY}`
                },
                body: JSON.stringify({
                    p_api_key_hash: apiKeyHash,
                    p_amount: 2.0,
                    p_success_url: successUrl,
                    p_cancel_url: 'https://yourdomain.com/cancel',
                    p_signature: signature,
                    p_timestamp: timestamp
                })
            });

            const data = await response.json();
            if (data.payment_token) {
                document.getElementById('qrcode').innerHTML = '';
                new QRCode(document.getElementById('qrcode'), {
                    text: `APP://PAY?type=session&token=${data.payment_token}`,
                    width: 180, height: 180
                });
                resDiv.style.display = 'block';
                startPolling(data.payment_token);
            }
        }

        function startPolling(token) {
            const interval = setInterval(async () => {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/resolve_payment_token_v2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` },
                    body: JSON.stringify({ p_payment_token: token })
                });
                const data = await res.json();
                if (data.status === 'completed') {
                    clearInterval(interval);
                    document.getElementById('tester-card').innerHTML = `
                        <div class="success-box">
                            <h2>✅ Payment Received!</h2>
                            <p>RS ${data.amount} successfully added to your merchant account.</p>
                            <button onclick="location.reload()" style="margin-top:20px">New Test</button>
                        </div>
                    `;
                }
            }, 3000);
        }
    </script>
</body>

</html>
